{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="stylesheet" href="{% static 'css/hospedagens.css' %}">
</head>
<body>
  <main class="page narrow">
    <header class="page-header">
      <div>
        <p class="eyebrow">Hospedaria</p>
        <h1>Perfil</h1>
      </div>
      <a class="button danger" href="{% url 'usuarios:logout_usuario' %}">Sair</a>
    </header>

    <article class="card">
      <h2>{{ request.user.username }}</h2>
      <p class="description">Voce entrou como {{ tipo_usuario|default:"usuario" }}.</p>

      <div class="actions">
        <a class="button" href="{% url 'hospedagens:hospedagens_lista' %}">Hospedagens</a>
        <a class="button" href="{% url 'reservas:reservas_lista' %}">Reservas</a>
        <a class="button" href="{% url 'mensagens:mensagens_lista' %}">Mensagens</a>
        <a class="button" href="{% url 'avaliacoes:avaliacoes_lista' %}">Avaliacoes</a>
        {% if tipo_usuario == "anfitriao" %}
          <a class="button" href="{% url 'comodidades:comodidades_lista' %}">Comodidades</a>
          <a class="button" href="{% url 'enderecos:enderecos_lista' %}">Enderecos</a>
        {% endif %}
      </div>
    </article>
  </main>
</body>
</html>
