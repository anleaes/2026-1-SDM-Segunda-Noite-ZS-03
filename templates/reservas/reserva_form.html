{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ titulo }}</title>
  <link rel="stylesheet" href="{% static 'css/hospedagens.css' %}">
</head>
<body>
  <main class="page narrow">
    <header class="page-header">
      <div>
        <p class="eyebrow">Hospedaria</p>
        <h1>{{ titulo }}</h1>
      </div>
      <a class="button" href="{% url 'reservas:reservas_lista' %}">Voltar</a>
    </header>

    <form class="form-card" method="post">
      {% csrf_token %}

      {% for field in form %}
        <div class="field">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% for error in field.errors %}
            <p class="error">{{ error }}</p>
          {% endfor %}
        </div>
      {% endfor %}

      {% if form.non_field_errors %}
        <div class="error-box">
          {{ form.non_field_errors }}
        </div>
      {% endif %}

      <button class="button primary full" type="submit">Salvar</button>
    </form>
  </main>
</body>
</html>
